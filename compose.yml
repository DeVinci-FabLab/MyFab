x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 10

x-app-security: &app-security
  user: '1000:1000'
  read_only: true
  security_opt:
    - 'no-new-privileges:true'
  cap_drop:
    - ALL

services:
  mariadb:
    image: mariadb:latest
    container_name: myfab-db-${SLUG:-prod}
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    security_opt:
      - 'no-new-privileges:true'
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 500
    logging: *default-logging
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
    volumes:
      - ${VOLUMES_PATH}/myfab-tickets/mariaDB/:/var/lib/mysql
    networks:
      - myfab-internal
    healthcheck:
      <<: *healthcheck-defaults
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      start_period: 30s

  back:
    <<: *app-security
    image: ghcr.io/devinci-fablab/myfab-tickets-backend:latest
    container_name: myfab-back-${SLUG:-prod}
    restart: unless-stopped
    tmpfs:
      - /tmp
      - /home/node/MyFab_Back/tmp
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 200
    logging: *default-logging
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      API: ${API}
      FRONT_URL: ${FRONT_URL}
      SPECIALTOKEN: ${SPECIALTOKEN}
      SHOWSWAGGER: ${SHOWSWAGGER:-false}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - ${VOLUMES_PATH}/myfab-tickets/back/data/:/home/node/MyFab_Back/data/
      - ${VOLUMES_PATH}/myfab-tickets/back/logs/:/home/node/MyFab_Back/logs/
    networks:
      - myfab-internal
      - pangolin
    expose:
      - 5000
    healthcheck:
      <<: *healthcheck-defaults
      test:
        - 'CMD'
        - 'node'
        - '-e'
        - "require('http').get('http://localhost:5000/api/ping/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      start_period: 60s

  front:
    <<: *app-security
    image: ghcr.io/devinci-fablab/myfab-tickets-frontend:latest
    container_name: myfab-front-${SLUG}
    restart: unless-stopped
    tmpfs:
      - /tmp
      - /app/.next/cache
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 200
    logging: *default-logging
    depends_on:
      back:
        condition: service_healthy
    environment:
      API: ${API}
      BASE_PATH: ${BASE_PATH:-}
      IS_TEST_MODE: ${IS_TEST_MODE:-false}
      DARK_MODE_IN_TEST_MODE: ${DARK_MODE_IN_TEST_MODE:-false}
    volumes:
      # Icônes de rang (assets sous licence) servies depuis l'hôte — hors image
      # Docker et hors dépôt. Dossier optionnel : si absent/vide, l'app retombe
      # sur des badges générés (aucune erreur).
      - ${VOLUMES_PATH}/myfab-tickets/front/ranks/:/app/public/ranks/:ro
    networks:
      - pangolin
    expose:
      - 3000
    healthcheck:
      <<: *healthcheck-defaults
      test:
        - 'CMD'
        - 'node'
        - '-e'
        - "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
      start_period: 30s

networks:
  myfab-internal:
    name: myfab-internal-${SLUG:-prod}
    driver: bridge
  pangolin:
    external: true
